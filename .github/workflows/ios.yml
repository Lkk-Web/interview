name: iOS Build & Install

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'ios/**'
      - 'docs/**'
      - 'package.json'
      - 'yarn.lock'
      - 'app.style.ts'
      - '.umirc.ts'
      - '.github/workflows/ios.yml'
  workflow_dispatch:

jobs:
  ios:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Build web (Node 16)
        run: |
          source ~/.nvm/nvm.sh
          nvm use 16.19.1
          yarn install --registry https://registry.npmjs.org --ignore-engines
          MOBILE=1 npx dumi build

      - name: Cap sync (Node 22)
        run: |
          source ~/.nvm/nvm.sh
          nvm use 22.22.2
          npx cap sync ios

      - name: Check iPhone is reachable
        run: |
          if ! xcrun xctrace list devices 2>/dev/null | grep -q "00008140-001129082139801C"; then
            echo "iPhone not found. Make sure it's connected via USB or on the same WiFi."
            exit 1
          fi

      - name: Wait for iPhone unlock
        run: |
          osascript -e 'display dialog "请解锁 iPhone，30秒后自动继续安装。" buttons {"现在开始"} default button "现在开始" giving up after 30'

      - name: Unlock keychain
        run: |
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" ~/Library/Keychains/login.keychain-db
          security set-keychain-settings -t 3600 -u ~/Library/Keychains/login.keychain-db

      - name: Xcode build & install to iPhone
        run: |
          BUILD_DIR="$PWD/build/Debug-iphoneos"
          rm -rf "$BUILD_DIR"

          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -destination 'id=00008140-001129082139801C' \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=4R2DKQU2AP \
            CONFIGURATION_BUILD_DIR="$BUILD_DIR" \
            build

          xcrun devicectl device install app \
            --device 00008140-001129082139801C \
            "$BUILD_DIR/App.app"
